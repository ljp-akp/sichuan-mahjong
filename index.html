<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>简易四人麻将</title>
<style>
body{
    margin:0;
    background:#0b5d3b;
    font-family:Arial;
    color:#fff;
    text-align:center;
}

h1{margin:10px;}

.table{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
}

.player{
    background:#1a7a4a;
    padding:10px;
    border-radius:10px;
    min-height:120px;
}

.hand{
    margin-top:10px;
}

.card{
    display:inline-block;
    background:#fff;
    color:#000;
    padding:5px 8px;
    margin:3px;
    border-radius:5px;
    cursor:pointer;
}

#log{
    margin-top:10px;
    background:#00000044;
    padding:10px;
    height:120px;
    overflow:auto;
}
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🀄 简易四人麻将（可玩版）</h1>

<button onclick="startGame()">开始游戏</button>

<div class="table">
    <div class="player">玩家<br><div id="p0" class="hand"></div></div>
    <div class="player">电脑1<br><div id="p1" class="hand"></div></div>
    <div class="player">电脑2<br><div id="p2" class="hand"></div></div>
    <div class="player">电脑3<br><div id="p3" class="hand"></div></div>
</div>

<div id="log"></div>

<script>
let deck = [];
let hands = [[],[],[],[]];
let turn = 0;

function log(msg){
    document.getElementById("log").innerHTML += msg+"<br>";
}

function createDeck(){
    deck = [];
    for(let i=1;i<=9;i++){
        for(let j=0;j<4;j++){
            deck.push(i);
        }
    }
}

function shuffle(){
    deck.sort(()=>Math.random()-0.5);
}

function deal(){
    for(let i=0;i<13;i++){
        for(let p=0;p<4;p++){
            hands[p].push(deck.pop());
        }
    }
}

function render(){
    for(let p=0;p<4;p++){
        let el = document.getElementById("p"+p);
        el.innerHTML = "";
        hands[p].forEach((c,idx)=>{
            let div = document.createElement("div");
            div.className="card";
            div.innerText=c;
            if(p===0){
                div.onclick=()=>{
                    playCard(idx);
                }
            }
            el.appendChild(div);
        });
    }
}

function playCard(idx){
    if(turn!==0) return;
    let card = hands[0].splice(idx,1)[0];
    log("你出了："+card);
    nextTurn();
}

function aiPlay(p){
    let card = hands[p].splice(0,1)[0];
    log("电脑"+p+"出了："+card);
}

function nextTurn(){
    render();
    turn = (turn+1)%4;

    if(turn!==0){
        setTimeout(()=>{
            aiPlay(turn);
            nextTurn();
        },800);
    }
}

function startGame(){
    hands=[[],[],[],[]];
    createDeck();
    shuffle();
    deal();
    turn=0;
    document.getElementById("log").innerHTML="";
    log("游戏开始！");
    render();
}
</script>

</body>
</html>
