<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🀄 麻将小游戏 V2</title>

<style>
body{
    margin:0;
    font-family: "Arial";
    background: radial-gradient(circle at center,#0f7a4f,#063a25);
    color:white;
    text-align:center;
}

/* 标题 */
h1{
    margin:15px 0;
    font-size:22px;
    letter-spacing:2px;
}

/* 按钮 */
button{
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:16px;
    margin:10px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* 桌面布局 */
.table{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:15px;
}

/* 玩家框 */
.player{
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:10px;
    min-height:140px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

/* 牌 */
.hand{
    margin-top:10px;
}

.card{
    display:inline-block;
    width:32px;
    height:44px;
    line-height:44px;
    margin:3px;
    background:linear-gradient(#fff,#e6e6e6);
    color:#111;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,0.3);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

/* 日志 */
#log{
    margin:10px auto;
    width:90%;
    height:120px;
    overflow:auto;
    background:rgba(0,0,0,0.3);
    border-radius:10px;
    padding:10px;
    text-align:left;
    font-size:13px;
}
</style>
</head>

<body>

<h1>🀄 麻将小游戏 V2（美化版）</h1>

<button onclick="startGame()">开始游戏</button>

<div class="table">
    <div class="player">你
        <div id="p0" class="hand"></div>
    </div>

    <div class="player">电脑1
        <div id="p1" class="hand"></div>
    </div>

    <div class="player">电脑2
        <div id="p2" class="hand"></div>
    </div>

    <div class="player">电脑3
        <div id="p3" class="hand"></div>
    </div>
</div>

<div id="log"></div>

<script>
let deck=[],hands=[[],[],[],[]],turn=0;

function log(t){
    document.getElementById("log").innerHTML += t+"<br>";
}

function createDeck(){
    deck=[];
    for(let i=1;i<=9;i++){
        for(let j=0;j<4;j++){
            deck.push(i);
        }
    }
}

function shuffle(){
    deck.sort(()=>Math.random()-0.5);
}

function deal(){
    for(let i=0;i<13;i++){
        for(let p=0;p<4;p++){
            hands[p].push(deck.pop());
        }
    }
}

function render(){
    for(let p=0;p<4;p++){
        let el=document.getElementById("p"+p);
        el.innerHTML="";
        hands[p].forEach((c,idx)=>{
            let div=document.createElement("div");
            div.className="card";
            div.innerText=c;
            if(p===0){
                div.onclick=()=>play(idx);
            }
            el.appendChild(div);
        });
    }
}

function play(i){
    if(turn!==0)return;
    let c=hands[0].splice(i,1)[0];
    log("你出牌："+c);
    next();
}

function ai(p){
    let c=hands[p].splice(0,1)[0];
    log("电脑"+p+"："+c);
}

function next(){
    render();
    turn=(turn+1)%4;
    if(turn!==0){
        setTimeout(()=>{
            ai(turn);
            next();
        },700);
    }
}

function startGame(){
    hands=[[],[],[],[]];
    createDeck();
    shuffle();
    deal();
    turn=0;
    document.getElementById("log").innerHTML="";
    log("游戏开始 🀄");
    render();
}
</script>

</body>
</html>
