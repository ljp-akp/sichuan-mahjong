<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🀄 麻将 V3</title>

<style>
body{
    margin:0;
    font-family: "PingFang SC","Arial";
    background: radial-gradient(circle at center,#0c6b45,#052e1e);
    color:white;
    text-align:center;
}

/* 标题 */
h1{
    margin:10px 0;
    font-size:20px;
    letter-spacing:2px;
}

/* 开始按钮 */
button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00e676,#00c853);
    color:white;
    font-size:16px;
    margin:8px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* 游戏桌 */
.table{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
}

/* 玩家区域 */
.player{
    background:rgba(255,255,255,0.06);
    border-radius:16px;
    padding:8px;
    min-height:130px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
}

/* 名字 */
.player-title{
    font-size:13px;
    opacity:0.8;
    margin-bottom:5px;
}

/* 手牌区 */
.hand{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:4px;
}

/* 麻将牌 */
.card{
    width:30px;
    height:42px;
    background:linear-gradient(#fff,#eaeaea);
    border-radius:6px;
    color:#111;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,0.4);
    transition:0.15s;
    user-select:none;
}

.card:hover{
    transform:translateY(-3px) scale(1.05);
}

/* 日志 */
#log{
    margin:10px auto;
    width:92%;
    height:130px;
    overflow:auto;
    background:rgba(0,0,0,0.25);
    border-radius:12px;
    padding:10px;
    font-size:12px;
    text-align:left;
}
</style>
</head>

<body>

<h1>🀄 麻将小游戏 V3（高级美化版）</h1>

<button onclick="startGame()">开始游戏</button>

<div class="table">

    <div class="player">
        <div class="player-title">你（玩家）</div>
        <div id="p0" class="hand"></div>
    </div>

    <div class="player">
        <div class="player-title">电脑1</div>
        <div id="p1" class="hand"></div>
    </div>

    <div class="player">
        <div class="player-title">电脑2</div>
        <div id="p2" class="hand"></div>
    </div>

    <div class="player">
        <div class="player-title">电脑3</div>
        <div id="p3" class="hand"></div>
    </div>

</div>

<div id="log"></div>

<script>
let deck=[],hands=[[],[],[],[]],turn=0;

function log(t){
    document.getElementById("log").innerHTML += t+"<br>";
}

function createDeck(){
    deck=[];
    for(let i=1;i<=9;i++){
        for(let j=0;j<4;j++){
            deck.push(i);
        }
    }
}

function shuffle(){
    deck.sort(()=>Math.random()-0.5);
}

function deal(){
    for(let i=0;i<13;i++){
        for(let p=0;p<4;p++){
            hands[p].push(deck.pop());
        }
    }
}

function render(){
    for(let p=0;p<4;p++){
        let el=document.getElementById("p"+p);
        el.innerHTML="";
        hands[p].forEach((c,idx)=>{
            let div=document.createElement("div");
            div.className="card";
            div.innerText=c;

            if(p===0){
                div.onclick=()=>play(idx);
            }

            el.appendChild(div);
        });
    }
}

function play(i){
    if(turn!==0)return;
    let c=hands[0].splice(i,1)[0];
    log("你出牌："+c);
    next();
}

function ai(p){
    let c=hands[p].splice(0,1)[0];
    log("电脑"+p+"出："+c);
}

function next(){
    render();
    turn=(turn+1)%4;

    if(turn!==0){
        setTimeout(()=>{
            ai(turn);
            next();
        },600);
    }
}

function startGame(){
    hands=[[],[],[],[]];
    createDeck();
    shuffle();
    deal();
    turn=0;
    document.getElementById("log").innerHTML="";
    log("🀄 游戏开始");
    render();
}
</script>

</body>
</html>
